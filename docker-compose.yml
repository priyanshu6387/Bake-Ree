services:
  mongo:
    image: mongo:7
    container_name: bake-ree-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bake-ree-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/bake_ree
      JWT_SECRET: change_this_in_prod
      JWT_EXPIRES_IN: 14d
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    ports:
      - "5000:5000"
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bake-ree-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: http://localhost:5000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next:/app/.next
    ports:
      - "3000:3000"
    command: npm run dev -- --turbopack -H 0.0.0.0 -p 3000

volumes:
  mongo_data:
  server_node_modules:
  client_node_modules:
  client_next:
